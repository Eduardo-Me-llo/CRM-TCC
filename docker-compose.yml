services:
  postgres:
    image: postgres:16-alpine
    container_name: crm_saas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: crm_saas
    ports:
      - "5432:5432"
    volumes:
      - crm_saas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_saas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  crm_saas_pgdata:
